version: '3.8'

services:
  coqui-tts:
    image: ghcr.io/idiap/coqui-tts-cpu:latest
    container_name: amo-tts
    ports:
      - "5002:5002"
    environment:
      - MODEL=tts_models/multilingual/multi-dataset/xtts_v2
    volumes:
      - ./voices:/root/.local/share/tts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002"]
      interval: 30s
      timeout: 10s
      retries: 3
