services:
  whisper-stt:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: amo-whisper-stt
    ports:
      - "9000:9000"
    environment:
      ASR_MODEL: ${STT_WHISPER_MODEL:-small}
      ASR_ENGINE: ${STT_WHISPER_ENGINE:-faster_whisper}
    volumes:
      - whisper-model-cache:/root/.cache

volumes:
  whisper-model-cache:
